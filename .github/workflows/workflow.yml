name: Validation

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-types:
    name: lint-and-types
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --all-groups --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run ty check
