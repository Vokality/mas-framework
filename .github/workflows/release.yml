# Release workflow for the mas-framework uv workspace.
#
# Best practices followed (per uv + PyPI docs):
# - Separate build and publish jobs (build has no publish permissions).
# - Use `uv build --no-sources` for reproducible published artifacts.
# - Bare `uv publish` (uv auto-detects GitHub Actions + id-token for Trusted Publishing).
# - Publish in dependency order (sub-packages before meta-package).
# - GitHub Environment + id-token: write for Trusted Publishing (no tokens/secrets).
# - Artifacts to pass dists between jobs.
#
# Trigger: pushing a tag like v0.5.0
#
# REQUIRED ONE-TIME SETUP:
#
# 1. GitHub repo settings:
#    Settings → Environments → New environment called "pypi"
#    (Recommended: add "Required reviewers" for manual approval gate)
#
# 2. On PyPI (https://pypi.org) for EVERY package (including the meta):
#    - mas-proto
#    - mas-core
#    - mas-gateway
#    - mas-server
#    - mas-agent
#    - mas-framework
#
#    For each:
#      Project → Settings → Publishing (or /manage/project/<name>/settings/publishing/)
#      Add a "GitHub" trusted publisher with:
#        GitHub repository owner: Vokality
#        GitHub repository name:   mas-framework
#        Workflow name:            release.yml
#        Environment name:         pypi
#
#    Repeat on https://test.pypi.org if you want TestPyPI support.
#
# To cut a release:
#   # Bump version in ALL packages/*/pyproject.toml (including mas-framework)
#   git tag -a v0.5.0 -m "Release v0.5.0"
#   git push origin v0.5.0
#
# The publish job will only proceed after any required environment approvals.

name: Release

on:
  push:
    tags:
      # Publish on any tag starting with v, e.g. v0.5.0
      - "v*"

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build packages (in dependency order)
        run: |
          set -euo pipefail
          PACKAGES=(
            mas-proto
            mas-core
            mas-gateway
            mas-server
            mas-agent
            mas-framework
          )
          for pkg in "${PACKAGES[@]}"; do
            echo ">>> Building $pkg"
            # --no-sources is recommended by uv for publishing so artifacts
            # don't depend on local workspace sources.
            uv build --package "$pkg" --no-sources
          done

      - name: List built distributions
        run: ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dists
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    # Environment + id-token permission required for PyPI Trusted Publishing.
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: List artifacts
        run: ls -l dist/

      - name: Publish packages (in dependency order)
        run: |
          set -euo pipefail
          publish_pkg() {
            local pkg="$1"
            # Normalize name for dist filenames (PEP 427/503): mas-core -> mas_core
            local norm="${pkg//-/_}"
            echo ">>> Publishing $pkg"
            # Bare `uv publish` is sufficient with GitHub + Trusted Publishing
            # (uv auto-detects the environment and id-token).
            uv publish dist/${norm}-*.tar.gz dist/${norm}-*.whl
          }

          publish_pkg mas-proto
          publish_pkg mas-core
          publish_pkg mas-gateway
          publish_pkg mas-server
          publish_pkg mas-agent
          publish_pkg mas-framework

          echo "All packages published."
