[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-agent"
version = "0.4.5"
description = "MAS agent client runtime"
requires-python = ">=3.13"
dependencies = [
    "grpcio>=1.81.1",
    "mas-core",
    "mas-proto",
    "pydantic>=2.13.4",
]

[tool.uv.sources]
mas-core = { workspace = true }
mas-proto = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mas_agent"]
