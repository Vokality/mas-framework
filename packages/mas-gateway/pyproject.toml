[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-gateway"
version = "0.4.5"
description = "MAS security and gateway policy modules"
requires-python = ">=3.13"
dependencies = [
    "mas-core",
    "pydantic>=2.12.3",
    "pydantic-settings>=2.0.0",
    "pyyaml>=6.0",
]

[tool.uv.sources]
mas-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mas_gateway"]
