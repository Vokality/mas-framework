[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-framework"
version = "0.5.0"
description = "MAS multi-agent runtime (all components)"
requires-python = ">=3.13"
dependencies = [
    "mas-proto==0.5.0",
    "mas-core==0.5.0",
    "mas-gateway==0.5.0",
    "mas-server==0.5.0",
    "mas-agent==0.5.0",
]

[tool.uv.sources]
mas-proto = { workspace = true }
mas-core = { workspace = true }
mas-gateway = { workspace = true }
mas-server = { workspace = true }
mas-agent = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mas_framework"]

