[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-proto"
version = "0.4.5"
description = "MAS runtime protobuf definitions"
requires-python = ">=3.13"
dependencies = [
    "grpcio>=1.76.0",
    "protobuf>=6.33.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mas_proto"]
