[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-msp-core"
version = "0.4.5"
description = "Deterministic MSP workflows and agent identifiers for MAS"
requires-python = ">=3.13"
dependencies = [
    "mas-agent",
    "mas-core",
    "mas-msp-contracts",
]

[tool.uv.sources]
mas-agent = { workspace = true }
mas-core = { workspace = true }
mas-msp-contracts = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mas_msp_core"]
