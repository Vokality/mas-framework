[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-msp-ai"
version = "0.4.5"
description = "Fabric-local MSP reasoning for MAS"
requires-python = ">=3.13"
dependencies = [
    "mas-agent",
    "mas-msp-contracts",
    "mas-msp-core",
    "pydantic-ai>=1.10.0",
]

[tool.uv.sources]
mas-agent = { workspace = true }
mas-msp-contracts = { workspace = true }
mas-msp-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mas_msp_ai"]
