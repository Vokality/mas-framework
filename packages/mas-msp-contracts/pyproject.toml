[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mas-msp-contracts"
version = "0.4.5"
description = "Shared MSP contracts for MAS"
requires-python = ">=3.13"
dependencies = [
    "mas-core",
    "pydantic>=2.12.3",
]

[tool.uv.sources]
mas-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mas_msp_contracts"]
